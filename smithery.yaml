runtime: "container"

build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."

startCommand:
  type: "http"
  configSchema:
    type: "object"
    properties:
      apiKey:
        type: "string"
        title: "NexusBridge API Key"
        description: "Your NexusBridge API key (starts with nb_sk_). Get one at https://syntss.com"
      baseUrl:
        type: "string"
        title: "API Base URL"
        description: "NexusBridge API base URL. Only change this if you're running a self-hosted instance."
        default: "https://syntss.com"
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['dist/index.js'],
      env: {
        NEXUSBRIDGE_API_KEY: config.apiKey || '',
        NEXUSBRIDGE_BASE_URL: config.baseUrl || 'https://syntss.com',
        PORT: '8000'
      }
    })
  exampleConfig:
    apiKey: "nb_sk_your_api_key_here"
    baseUrl: "https://syntss.com"
